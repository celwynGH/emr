<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EMR System</title>
  <link rel="icon" type="image/png" href="images/mypic.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="emr.css">
</head>
<body>

<header class="main-header">
  <div class="logo-container">
    <img src="images/clinic-logo.png" alt="image para sa Logo" class="clinic-logo">
  </div>

  <div class="header-center">
    <h1>Clinic Electronic Medical Records</h1>
    <div class="dashboard">
      Total Patients: <span id="totalPatients">0</span>
    </div>
  </div>
</header>


<section class="form-section">

  <h2>Patient Information</h2>

  <input type="hidden" id="editIndex">

  <input type="text" id="name" placeholder="Full Name">
  <input type="number" id="age" placeholder="Age">
  <select id="gender">
  <option value="">Select Gender</option>
  <option value="Male">Male</option>
  <option value="Female">Female</option>
</select>


  <h3>Vital Signs</h3>
  <input type="text" id="bp" placeholder="Blood Pressure">
  <input type="text" id="hr" placeholder="Heart Rate">
  <input type="text" id="temp" placeholder="Temperature">

  <h3>Clinical Details</h3>
  <input type="text" id="diagnosis" placeholder="Diagnosis">
  <input type="text" id="medication" placeholder="Medication">
  <textarea id="notes" placeholder="Clinical Notes"></textarea>

  <button onclick="saveRecord()">Save Record</button>
</section>

<section class="search-section">
  <input type="text" id="search" placeholder="Search patient..." onkeyup="render()">
</section>

<section class="records-section">
  <h2>Patient Records</h2>
  <div id="records"></div>
</section>

<script src="emr.js"></script>
</body>
</html>
